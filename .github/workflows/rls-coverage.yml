name: RLS Coverage

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'supabase/migrations/**'
  push:
    branches: [dev, main]
    paths:
      - 'supabase/migrations/**'

jobs:
  rls-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run RLS Coverage Tests
        run: npx vitest run tests/rls/rls-coverage
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
